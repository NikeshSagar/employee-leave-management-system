<!DOCTYPE html>
<html>

<head>
<title>Leave Calendar</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

</head>

<body>

<div class="header">Leave Calendar</div>

<div class="container">

<div id="calendar"></div>

</div>

<script>

document.addEventListener('DOMContentLoaded', function() {

let requests=JSON.parse(localStorage.getItem("leaveRequests"))||[];

let events=[

{title:'Republic Day',date:'2026-01-26'},
{title:'Independence Day',date:'2026-08-15'},
{title:'Christmas',date:'2026-12-25'}

];

requests.forEach(function(r){

if(r.status==="Approved"){

events.push({
title:r.employee+" Leave",
start:r.start,
end:r.end
});

}

});

var calendar=new FullCalendar.Calendar(
document.getElementById('calendar'),
{
initialView:'dayGridMonth',
events:events
});

calendar.render();

});

</script>

</body>
</html>
